<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | José Pimentel</title>
    <style>
        /* Baseado nas variáveis que você enviou */
        :root {
            --background: #0d0d0d; /* oklch(0.145 0 0) */
            --foreground: #fcfcfc; /* oklch(0.985 0 0) */
            --primary: #7c3aed;    /* Um roxo vibrante para o tema Dark */
            --card: #1a1a1a;
            --muted: #717182;
            --radius: 0.625rem;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background-color: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .profile-border {
            width: 80px;
            height: 80px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.5rem;
        }

        h1 {
            font-size: 1.5rem; /* text-2xl do seu código */
            font-weight: 500;
            margin: 0;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .description {
            margin: 1.5rem 0;
            line-height: 1.6;
            color: #d1d1d1;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-border">JP</div>
        <h1>José Pimentel</h1>
        <p class="subtitle">Análise e Desenvolvimento de Sistemas</p>
        
        <div class="description">
            Estudante de ADS com foco em transformar protótipos do Figma em aplicações reais e eficientes.
        </div>
        
        <a href="https://github.com/jose1pimentel0" class="btn-primary" target="_blank">
            Acessar Repositórios
        </a>
    </div>

</body>
</html>
