<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | José Pimentel</title>
    <style>
        :root {
            /* Cores estilo Figma (Roxo) */
            --bg-dark: #0f0a19;
            --card-bg: #1a1229;
            --primary-purple: #9d4edd;
            --light-purple: #c77dff;
            --text-white: #f3f0f7;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .portfolio-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(157, 78, 221, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-purple);
        }

        .profile-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-purple), var(--light-purple));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .tag {
            background: rgba(157, 78, 221, 0.1);
            color: var(--light-purple);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 10px;
            font-weight: 600;
        }

        p {
            color: #b0a4c4;
            line-height: 1.6;
            margin: 20px 0;
        }

        .btn {
            background-color: var(--primary-purple);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: var(--light-purple);
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <div class="profile-circle">JP</div>
        <h1>José Pimentel</h1>
        <span class="tag">Análise e Des. de Sistemas</span>
        
        <p>Desenvolvedor focado em transformar ideias do Figma em experiências digitais modernas.</p>
        
        <a href="https://github.com/jose1pimentel0" class="btn" target="_blank">Ver Projetos</a>
    </div>

</body>
</html>
