<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | José Pimentel</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8; /* Azul tecnológico */
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border: 1px solid #334155;
            border-radius: 15px;
            background: #1e293b;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        h1 { color: var(--accent-color); margin-bottom: 0.5rem; }
        p { font-size: 1.2rem; color: #94a3b8; }
        .links { margin-top: 20px; }
        .links a {
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .links a:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>José Pimentel</h1>
        <p>Análise e Desenvolvimento de Sistemas</p>
        <p>Transformando designs do Figma em código real.</p>
        <div class="links">
            <a href="https://github.com/jose1pimentel0" target="_blank">Meu GitHub</a>
        </div>
    </div>
</body>
</html>
